name: Scholarship Robot Unsubscribe Monitor

on:
  workflow_dispatch:        # manual trigger still available at any time
  # Phase 6 enabled 2026-07-12: Phase 5 manual tests passed (STOP/NEUTRAL classification
  # verified, is_automated() own-domain + subject-pattern gap fixed and re-verified against
  # the 3 real senders that slipped through the first live run).
  schedule:
    # 6 runs/day — 15 min after sender (:30) to avoid git conflicts
    # Times in UTC; WAT = UTC+1
    - cron: "45 1 * * *"   # 02:45 WAT
    - cron: "45 5 * * *"   # 06:45 WAT
    - cron: "45 9 * * *"   # 10:45 WAT
    - cron: "45 13 * * *"  # 14:45 WAT
    - cron: "45 17 * * *"  # 18:45 WAT
    - cron: "45 21 * * *"  # 22:45 WAT

concurrency:
  group: scholarship-unsub-pipeline
  cancel-in-progress: false  # never cancel mid-run

permissions:
  contents: write  # required for git push in commit step

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for clean rebase on push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest state before run
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true

      - name: Run monitor
        env:
          # NOTE: left side (ROMANCE_EMAIL_PASS) is the env var name unsubscribe_monitor.py
          # actually reads via os.environ.get() - do not rename this side. Right side
          # points at the actual secret name in THIS repo, which was created as
          # SCHOLARSHIP_EMAIL_PASS (not ROMANCE_EMAIL_PASS like the playbook's template).
          ROMANCE_EMAIL_PASS: ${{ secrets.SCHOLARSHIP_EMAIL_PASS }}
          BREVO_USER:         ${{ secrets.BREVO_USER }}
          BREVO_PASS:         ${{ secrets.BREVO_PASS }}
        run: python unsubscribe_monitor.py

      - name: Commit and push state files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Touch optional files so git add never fails on a clean run
          touch unsubscribed_emails.txt email_tracking.csv monitor_processed.txt
          git add unsubscribed_emails.txt email_tracking.csv monitor_processed.txt
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: monitor state update [skip ci]"
          # Retry loop — handles race condition if sender pushes at same moment
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed — retrying in 15s..."
            sleep 15
          done
